<!-- Presenting Services and Products -->
<style>
  :root {
    --exam-ink: #1f2937;
    --exam-subtle-ink: #4b5563;
    --exam-border: #cfd6df;
    --exam-soft-border: #e5e7eb;
    --exam-header-bg: #f6f8fb;
    --exam-panel-bg: #fbfcfe;
    --exam-accent: #1e3a8a;
  }

  body {
    color: var(--exam-ink);
  }

  .exam-header {
    border: 1px solid var(--exam-border);
    background: linear-gradient(to bottom, #ffffff, var(--exam-header-bg));
    border-radius: 8px;
    padding: 12px 14px;
  }

  .keep-together {
    border: 1px solid var(--exam-soft-border);
    border-radius: 8px;
    background: var(--exam-panel-bg);
    padding: 12px 14px;
    margin-bottom: 18px;
  }

  .keep-together:last-child {
    margin-bottom: 0;
  }

  h2 {
    color: var(--exam-accent) !important;
    margin-top: 0;
  }

  h3 {
    margin-top: 0;
    color: #0f172a;
  }

  .key-lang-grid {
    display: grid;
    gap: 14px;
  }

  .key-lang-card {
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid transparent;
  }

  .key-lang-card--greeting {
    background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
    border-color: #bfdbfe;
  }

  .key-lang-card--presenting {
    background: linear-gradient(135deg, #fff7ed 0%, #fffbeb 100%);
    border-color: #fed7aa;
  }

  .key-lang-card--recommending {
    background: linear-gradient(135deg, #f5f3ff 0%, #faf5ff 100%);
    border-color: #ddd6fe;
  }

  .key-lang-card--closing {
    background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
    border-color: #a7f3d0;
  }

  .key-lang-card-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 0 0 10px;
  }

  .key-lang-card--greeting .key-lang-card-title {
    color: #1d4ed8;
  }

  .key-lang-card--presenting .key-lang-card-title {
    color: #c2410c;
  }

  .key-lang-card--recommending .key-lang-card-title {
    color: #6d28d9;
  }

  .key-lang-card--closing .key-lang-card-title {
    color: #047857;
  }

  .phrase-sentence-list {
    list-style-type: none !important;
    padding-left: 0 !important;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .phrase-sentence-list li {
    display: flex !important;
    align-items: flex-start;
    gap: 10px;
    margin: 0;
    padding: 8px 12px;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #0f172a;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    line-height: 1.4;
  }

  .key-lang-card--greeting .phrase-sentence-list li {
    border-color: #93c5fd;
  }

  .key-lang-card--presenting .phrase-sentence-list li {
    border-color: #fdba74;
  }

  .key-lang-card--recommending .phrase-sentence-list li {
    border-color: #c4b5fd;
  }

  .key-lang-card--closing .phrase-sentence-list li {
    border-color: #6ee7b7;
  }

  .phrase-audio-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    padding: 0;
    border: 1px solid var(--exam-border);
    border-radius: 6px;
    background: #fff;
    color: #1e3a8a;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
  }

  .phrase-audio-btn:hover {
    background: #eff6ff;
    border-color: #93c5fd;
  }

  .phrase-audio-btn:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

  .phrase-en {
    flex: 1;
    min-width: 0;
  }

  /* Force visible markers (global app styles can hide them). */
  ol {
    list-style-type: decimal !important;
    list-style-position: outside !important;
    padding-left: 24px !important;
  }

  ul:not(.phrase-sentence-list) {
    list-style-type: disc !important;
    list-style-position: outside !important;
    padding-left: 22px !important;
  }

  @media print {
    @page {
      margin: 1.5cm;
    }

    body {
      margin: 0;
      padding: 0;
    }

    .resource-wrap {
      max-width: 100% !important;
      padding: 5mm 6mm !important;
      box-sizing: border-box !important;
      line-height: 1.25 !important;
      font-size: 14px !important;
    }

    h1 {
      font-size: 24px !important;
      margin-bottom: 2px !important;
    }

    h2 {
      font-size: 18px !important;
      margin-bottom: 6px !important;
    }

    h3 {
      font-size: 16px !important;
      margin-bottom: 6px !important;
    }

    p,
    li,
    .phrase-en {
      font-size: 14px !important;
    }

    .keep-together {
      break-inside: auto;
      page-break-inside: auto;
      background: #fff;
      border-color: #d1d5db;
      padding: 8px 10px;
      margin-bottom: 10px;
    }

    .key-lang-card {
      background: #fff !important;
    }

    .phrase-sentence-list li {
      box-shadow: none;
    }

    h2,
    h3 {
      break-after: avoid;
      page-break-after: avoid;
    }

    .phrase-audio-btn {
      display: none;
    }
  }

  /* Key Language drag + drop */
  .kl-instructions {
    font-size: 16px;
    margin: 0 0 14px;
    color: var(--exam-subtle-ink);
  }

  .kl-section-title {
    font-size: 18px;
    font-weight: 800;
    margin: 14px 0 10px;
    color: #0f172a;
  }

  .kl-table {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0 0 18px;
  }

  .kl-table-head,
  .kl-table-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
    gap: 10px 12px;
    align-items: center;
  }

  .kl-table-head {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--exam-subtle-ink);
    padding: 0 4px 4px;
    border-bottom: 1px solid var(--exam-soft-border);
  }

  .kl-table-head span:nth-child(2) {
    visibility: hidden;
  }

  .kl-table-row {
    padding: 8px 10px;
    background: #fff;
    border: 1px solid rgba(15, 23, 42, 0.1);
    border-radius: 10px;
    border-left: 4px solid #1d4ed8;
  }

  @media (max-width: 720px) {
    .kl-table-head,
    .kl-table-row {
      grid-template-columns: minmax(0, 1fr) 40px minmax(0, 1fr);
      gap: 8px;
    }
  }

  .kl-cell--en {
    min-width: 0;
  }

  .kl-cell--audio {
    display: flex;
    justify-content: center;
  }

  .kl-cell--fr {
    min-width: 0;
  }

  .kl-en-text {
    display: block;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    color: #0f172a;
  }

  .kl-drop {
    width: 100%;
    min-height: 38px;
    border-radius: 10px;
    border: 2px dashed rgba(109, 40, 217, 0.35);
    background: rgba(245, 243, 255, 0.25);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
  }

  .kl-drop.is-over {
    border-color: rgba(109, 40, 217, 0.7);
    background: rgba(245, 243, 255, 0.45);
  }

  .kl-drop.is-correct {
    border-style: solid;
    border-color: #15803d;
    background: #ecfdf5;
  }

  .kl-drop.is-wrong {
    border-style: solid;
    border-color: #b91c1c;
    background: #fee2e2;
  }

  .kl-drop-placeholder {
    font-size: 13px;
    color: rgba(100, 116, 139, 0.9);
    font-weight: 600;
  }

  .kl-bank {
    border: 1px solid rgba(15, 23, 42, 0.08);
    background: #fff;
    border-radius: 12px;
    padding: 12px 12px 10px;
  }

  .kl-bank-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 10px;
    color: #6d28d9;
  }

  .kl-chip-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  @media (max-width: 720px) {
    .kl-chip-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  .kl-chip {
    border-radius: 999px;
    padding: 8px 12px;
    border: 1px solid rgba(15, 23, 42, 0.12);
    background: linear-gradient(135deg, #faf5ff 0%, #ffffff 100%);
    font-size: 14px;
    font-weight: 800;
    color: #0f172a;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    cursor: grab;
    user-select: none;
    text-align: center;
  }

  .kl-chip:active {
    cursor: grabbing;
  }

  .kl-chip.is-selected {
    outline: 3px solid rgba(109, 40, 217, 0.25);
    border-color: rgba(109, 40, 217, 0.6);
  }

  .kl-actions {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }

  .kl-btn {
    appearance: none;
    border: 1px solid rgba(15, 23, 42, 0.14);
    border-radius: 10px;
    padding: 9px 12px;
    background: #0f172a;
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }

  .kl-btn--secondary {
    background: #fff;
    color: #0f172a;
  }

  .kl-status {
    font-size: 14px;
    font-weight: 700;
    color: var(--exam-subtle-ink);
  }

  @media print {
    .kl-bank,
    .kl-actions {
      display: none !important;
    }
    .kl-drop {
      border-color: #d1d5db !important;
      background: #fff !important;
    }
  }
</style>

<div class="resource-wrap" style="max-width: 900px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; line-height: 1.45; color: #333;">
  <div class="exam-header" style="text-align: center; margin-bottom: 18px;">
    <div style="display: inline-block; margin-bottom: 6px;">
      <img src="/brizzle-logo.png" alt="Brizzle Logo" style="width: 45px; height: 45px; object-fit: contain;" />
    </div>
    <h1 style="font-size: 30px; line-height: 1.2; margin: 0 0 4px; color: #0f172a;">Presenting Services and Products</h1>
    <h2 style="font-size: 22px; margin: 0; font-weight: 700;">Everyday English</h2>
  </div>

  <div class="keep-together">
    <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 8px;">Key Language</h2>
    <p class="kl-instructions">Read the sentences in English on the left. Drag and drop the French translation.</p>

    <!-- Activity UI is built by mountPresentingServicesProductsKeyLanguage (WorksheetViewer) -->
    <div id="kl-activity" data-kl-activity="true" aria-live="polite">
      <p style="margin:0;font-size:14px;color:#64748b;">Loading activity…</p>
    </div>
  </div>
</div>
